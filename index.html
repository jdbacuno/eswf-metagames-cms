<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESWF MetaGames</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="src/css/output.css" />
  </head>

  <body class="font-sans bg-dark-navy text-white overflow-x-clip">
    <!-- ================================================================
         TOP BANNER
         ================================================================ -->
    <header
      class="bg-dark-navy flex items-center justify-center py-3 relative overflow-hidden"
      id="header"
    ></header>

    <!-- ================================================================
         NAVBAR
         ================================================================ -->
    <nav
      class="sticky top-0 z-[100] shadow-[0_4px_24px_rgba(0,0,0,0.35)]"
      style="
        background: linear-gradient(
          to right,
          #0a1a6e,
          #1565c0,
          #1e88e5,
          #42a5f5
        );
      "
      id="navbar"
    ></nav>

    <!-- ================================================================
         MAIN CONTENT
         ================================================================ -->
    <main id="main-content" class="max-w-full overflow-x-hidden">
      <!-- HERO -->
      <section
        class="scroll-mt-20 relative flex items-center justify-center overflow-hidden text-center min-h-[600px]"
        id="hero"
        aria-labelledby="hero-title"
      ></section>

      <!-- WHAT ARE METAGAMES -->
      <section
        class="scroll-mt-20 bg-dark-navy px-10 pb-[50px] max-md:px-5 max-md:pt-[10px] max-md:pb-0 max-[480px]:px-3 max-[480px]:pt-2 max-[480px]:pb-0"
        id="what-are-metagames"
        aria-labelledby="wam-heading"
      ></section>

      <!-- MARQUEE -->
      <section
        class="scroll-mt-20 bg-black overflow-hidden py-[5px] whitespace-nowrap"
        id="infinite-slide-loop"
      ></section>

      <!-- NEWS AND UPDATES -->
      <section
        class="scroll-mt-20 bg-dark-navy py-10 pb-[50px] px-8 lg:px-16 max-md:px-5 max-md:py-7 max-md:pb-9 max-[480px]:px-[14px] max-[480px]:py-6 max-[360px]:px-[10px] max-[360px]:py-5"
        id="news-and-update"
      ></section>

      <!-- SPORTS AND GAMES -->
      <section
        class="scroll-mt-20 bg-dark-navy py-10 pb-[50px] max-md:py-7 max-md:pb-9 max-[480px]:py-6 max-[480px]:pb-7"
        id="sports-and-games"
        aria-labelledby="sports-heading"
      ></section>

      <!-- META MOVEMENT -->
      <section
        class="scroll-mt-20 bg-dark-navy"
        id="meta-movement"
        aria-labelledby="meta-movement-heading"
      ></section>

      <!-- METAGAMES EMBLEMS -->
      <section class="scroll-mt-20 bg-dark-navy" id="metagames-emblems"></section>

      <!-- THEME SONG -->
      <section
        class="scroll-mt-20 py-[60px] px-5 bg-dark-navy text-white"
        id="theme-song"
        aria-labelledby="theme-song-heading"
      ></section>

      <!-- HOST NATIONS -->
      <section class="scroll-mt-20 w-full overflow-x-hidden" id="host-section"></section>
    </main>

    <!-- ================================================================
         FOOTER
         ================================================================ -->
    <footer class="w-full" id="footer">
    </footer>
    
    <script type="module" src="src/js/app.js"></script>
    <script type="module" src="src/js/color-wheel.js"></script>
    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
